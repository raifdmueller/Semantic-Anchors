<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Semantic Anchors - Shared Vocabulary for LLM Communication</title>
    <meta name="title" content="Semantic Anchors - Shared Vocabulary for LLM Communication" />
    <meta name="description" content="110+ semantic anchors and semantic contracts for precise LLM communication. Curated methodologies, frameworks, and composable project conventions. Evaluated across 10 models." />
    <meta name="keywords" content="semantic anchors, semantic contracts, LLM, large language models, AI communication, prompt engineering, software development, TDD, architecture patterns, design principles, AGENTS.md" />
    <meta name="author" content="LLM Coding Community" />
    <meta name="language" content="English, German" />

    <!-- Font Awesome for AsciiDoc admonition icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://llm-coding.github.io/Semantic-Anchors/" />

    <!-- Language Alternates -->
    <link rel="alternate" hreflang="en" href="https://llm-coding.github.io/Semantic-Anchors/" />
    <link rel="alternate" hreflang="de" href="https://llm-coding.github.io/Semantic-Anchors/?lang=de" />
    <link rel="alternate" hreflang="x-default" href="https://llm-coding.github.io/Semantic-Anchors/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://llm-coding.github.io/Semantic-Anchors/" />
    <meta property="og:title" content="Semantic Anchors - Shared Vocabulary for LLM Communication" />
    <meta property="og:description" content="110+ semantic anchors and semantic contracts for precise LLM communication. Evaluated across 10 models." />
    <meta property="og:image" content="https://llm-coding.github.io/Semantic-Anchors/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:site_name" content="Semantic Anchors" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://llm-coding.github.io/Semantic-Anchors/" />
    <meta name="twitter:title" content="Semantic Anchors - Shared Vocabulary for LLM Communication" />
    <meta name="twitter:description" content="110+ semantic anchors and semantic contracts for precise LLM communication. Evaluated across 10 models." />
    <meta name="twitter:image" content="https://llm-coding.github.io/Semantic-Anchors/twitter-card.png" />

    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Semantic Anchors",
      "alternateName": "Semantic Anchors for LLMs",
      "url": "https://llm-coding.github.io/Semantic-Anchors/",
      "description": "110+ semantic anchors and semantic contracts for precise communication with Large Language Models. Evaluated across 10 models.",
      "inLanguage": ["en", "de"],
      "publisher": {
        "@type": "Organization",
        "name": "LLM Coding Community",
        "url": "https://github.com/LLM-Coding"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://llm-coding.github.io/Semantic-Anchors/#/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Privacy-friendly, cookieless analytics (GoatCounter). No cookies, no
         personal data, no IP storage — so no consent banner is required.
         count.js is self-hosted (first-party) to avoid a third-party script
         dependency; only the aggregated hit is sent to GoatCounter. Skips
         localhost automatically. -->
    <script
      data-goatcounter="https://semanchors.goatcounter.com/count"
      async
      src="%BASE_URL%count.js"
    ></script>
  </head>
  <body>
    <!--
      Skeleton shell: reserves viewport-height layout space so first paint
      already has the expected header/content/footer footprint. Without this
      the SPA boot caused CLS ~0.975 (empty #app → populated #app). main.js
      detects the skeleton via #shell-header / #shell-footer and replaces the
      header + footer in place, leaving #page-content untouched. See #432.
    -->
    <div id="app">
      <div id="shell-root" class="flex flex-col" style="min-height: 100vh;">
        <div id="shell-header" class="border-b border-[var(--color-border)]" style="height: 8.75rem;" aria-hidden="true"></div>
        <div id="page-content" class="flex-1" style="min-height: calc(100vh - 14.75rem);"></div>
        <div id="shell-footer" class="border-t border-[var(--color-border)]" style="height: 6rem;" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
